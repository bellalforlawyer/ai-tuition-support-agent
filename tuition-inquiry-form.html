<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuition Center — Class Inquiry</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: #1f2421;
    color: #eae6df;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #eae6df;
    color: #1f2421;
    max-width: 440px;
    width: 100%;
    padding: 40px 36px;
    border-radius: 2px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }

  .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #a45c3a;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 26px;
    font-weight: normal;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  p.sub {
    font-size: 14px;
    color: #52584f;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #52584f;
    margin-bottom: 6px;
    margin-top: 18px;
  }

  input, select {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid #c9c2b4;
    background: #fff;
    font-family: inherit;
    font-size: 15px;
    color: #1f2421;
  }

  input:focus, select:focus {
    outline: none;
    border-color: #a45c3a;
  }

  button {
    width: 100%;
    margin-top: 28px;
    padding: 13px;
    background: #a45c3a;
    color: #eae6df;
    border: none;
    font-family: inherit;
    font-size: 15px;
    letter-spacing: 0.5px;
    cursor: pointer;
  }

  button:hover { background: #8a4a2d; }
  button:disabled { background: #c9c2b4; cursor: wait; }

  #result {
    margin-top: 22px;
    padding: 16px;
    background: #fff;
    border-left: 3px solid #a45c3a;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    display: none;
  }

  #result.show { display: block; }
  #result.error { border-left-color: #b23b3b; }
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow">Class Inquiry</div>
  <h1>Book a Class</h1>
  <p class="sub">Fill in your details and we'll confirm your slot right away.</p>

  <form id="inquiryForm">
    <label for="student_name">Your Name</label>
    <input type="text" id="student_name" required placeholder="e.g. Hamza">

    <label for="subject">Subject</label>
    <input type="text" id="subject" required placeholder="e.g. Mathematics">

    <label for="class_level">Class Level</label>
    <input type="text" id="class_level" required placeholder="e.g. 9th">

    <label for="preferred_time">Preferred Time</label>
    <select id="preferred_time" required>
      <option value="">Select...</option>
      <option value="Morning">Morning</option>
      <option value="Afternoon">Afternoon</option>
      <option value="Evening">Evening</option>
    </select>

    <button type="submit" id="submitBtn">Send Inquiry</button>
  </form>

  <div id="result"></div>
</div>

<script>
  const WEBHOOK_URL = "https://engineerbilal44.app.n8n.cloud/webhook-test/e7f646e1-6abe-49ed-833a-3eea8b03e9cb";

  const form = document.getElementById('inquiryForm');
  const resultBox = document.getElementById('result');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const data = {
      student_name: document.getElementById('student_name').value,
      subject: document.getElementById('subject').value,
      class_level: document.getElementById('class_level').value,
      preferred_time: document.getElementById('preferred_time').value
    };

    submitBtn.disabled = true;
    submitBtn.textContent = "Sending...";
    resultBox.classList.remove('show', 'error');

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const text = await response.text();
      resultBox.textContent = text;
      resultBox.classList.add('show');
    } catch (err) {
      resultBox.textContent = "Could not reach the server. Please check the webhook URL or your connection.";
      resultBox.classList.add('show', 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Send Inquiry";
    }
  });
</script>

</body>
</html>
